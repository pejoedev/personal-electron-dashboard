<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="styles/default.css" />
    <link rel="stylesheet" href="styles/dashboard.css" />
    <link rel="stylesheet" href="styles/messages.css" />
    <link rel="stylesheet" href="styles/analytics.css" />
    <link rel="stylesheet" href="styles/settings.css" />
    <link rel="stylesheet" href="styles/pageElements.css" />
</head>

<body>
    <!-- Shared Header (populated by header.js) -->
    <header class="header" id="header"></header>

    <!-- Dynamic Page Content (populated by router.js) -->
    <main class="main-content" id="page-container"></main>

    <!-- Shared Footer (populated by footer.js) -->
    <footer class="footer" id="footer"></footer>

    <!-- Scripts: Load in dependency order -->
    <!-- 1. Core dependencies -->
    <script src="communicator.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <script src="router.js"></script>

    <!-- 2. State and utilities (needed by page modules) -->
    <script src="state.js"></script>
    <script src="utils.js"></script>

    <!-- 3. Page-specific modules -->
    <script src="dashboard.js"></script>
    <script src="messages.js"></script>

    <!-- 4. Main app entry point (ties everything together) -->
    <script src="app.js"></script>
</body>

</html>
