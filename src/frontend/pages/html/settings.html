<section id="settings" class="content-section">
    <div class="section-header">
        <h2>Settings</h2>
        <p>Configure your dashboard preferences</p>
    </div>

    <div class="settings-container">
        <!-- General Settings -->
        <div class="settings-section">
            <h3>General Settings</h3>
            <div class="setting-item">
                <label for="app-name">Application Name</label>
                <input type="text" id="app-name" value="Personal Dashboard" />
            </div>
            <div class="setting-item">
                <label for="app-theme">Theme</label>
                <select id="app-theme">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="auto">Auto</option>
                </select>
            </div>
        </div>

        <!-- Notification Settings -->
        <div class="settings-section">
            <h3>Notifications</h3>
            <div class="setting-item checkbox">
                <input type="checkbox" id="enable-notifications" checked />
                <label for="enable-notifications">Enable Desktop Notifications</label>
            </div>
            <div class="setting-item checkbox">
                <input type="checkbox" id="enable-email" checked />
                <label for="enable-email">Email Alerts</label>
            </div>
        </div>

        <!-- Data Settings -->
        <div class="settings-section">
            <h3>Data & Privacy</h3>
            <div class="setting-item checkbox">
                <input type="checkbox" id="collect-analytics" checked />
                <label for="collect-analytics">Allow analytics collection</label>
            </div>
            <button class="btn btn-secondary">Clear Cache</button>
            <button class="btn btn-danger">Reset to Defaults</button>
        </div>

        <!-- Action Buttons -->
        <div class="settings-actions">
            <button class="btn btn-primary">Save Settings</button>
            <button class="btn btn-secondary">Cancel</button>
        </div>
    </div>
</section>
