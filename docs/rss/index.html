<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Feed - Personal Electron Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .article-item {
            border-bottom: 1px solid #ddd;
            padding-bottom: 30px;
        }

        .article-item:last-child {
            border-bottom: none;
        }

        .article-item-title {
            font-size: 1.8rem;
            color: #222;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .article-item-link {
            color: #0066cc;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.95rem;
        }

        .article-item-link:hover {
            color: #0052a3;
            text-decoration: underline;
        }

        .article-item-meta {
            color: #777;
            font-size: 0.95rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin-bottom: 12px;
        }

        .article-item-description {
            font-size: 1.05rem;
            color: #444;
            margin-bottom: 12px;
        }

        .feed-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .home-link {
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="article-header feed-title">
            <h1 class="article-title">Latest Articles</h1>
            <p class="article-meta">Personal Electron Dashboard Feed</p>
        </div>

        <div class="articles-list" id="articles-container">
            <p style="text-align: center; color: #999;">Loading articles...</p>
        </div>

        <div class="home-link">
            <a href="../" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        async function loadRSSFeed() {
            try {
                const response = await fetch('./index.rss');
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');

                if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
                    throw new Error('Failed to parse XML');
                }

                const items = xmlDoc.getElementsByTagName('item');
                const container = document.getElementById('articles-container');
                container.innerHTML = '';

                if (items.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999;">No articles available yet.</p>';
                    return;
                }

                Array.from(items).forEach(item => {
                    const title = item.getElementsByTagName('title')[0]?.textContent || 'Untitled';
                    const description = item.getElementsByTagName('description')[0]?.textContent || '';
                    const link = item.getElementsByTagName('link')[0]?.textContent || '#';
                    const guid = item.getElementsByTagName('guid')[0]?.textContent || '';

                    // Parse date from the article HTML if available
                    const pubDate = item.getElementsByTagName('pubDate')[0]?.textContent || '';

                    const articleEl = document.createElement('article');
                    articleEl.className = 'article-item';
                    articleEl.innerHTML = `
                        <h2 class="article-item-title">${escapeHtml(title)}</h2>
                        ${pubDate ? `<p class="article-item-meta">Posted on ${escapeHtml(pubDate)}</p>` : ''}
                        <p class="article-item-description">${escapeHtml(description)}</p>
                        <a href="${link}" class="article-item-link">Read more →</a>
                    `;
                    container.appendChild(articleEl);
                });
            } catch (error) {
                console.error('Error loading RSS feed:', error);
                document.getElementById('articles-container').innerHTML =
                    '<p style="text-align: center; color: #cc0000;">Error loading articles. Please try again later.</p>';
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load RSS feed when page loads
        document.addEventListener('DOMContentLoaded', loadRSSFeed);
    </script>
</body>

</html>
