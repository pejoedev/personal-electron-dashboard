<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Electron Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        a {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-github {
            background-color: #333;
            color: white;
        }

        .btn-github:hover {
            background-color: #555;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-rss {
            background-color: #ff9500;
            color: white;
        }

        .btn-rss:hover {
            background-color: #e68000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 149, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome</h1>
        <p class="subtitle">Personal Electron Dashboard</p>
        <p style="color: #666; margin-bottom: 20px;">
            A dashboard application built with Electron for managing messages, RSS feeds, and system tasks.
        </p>

        <div class="links">
            <a href="https://github.com/pejoedev/personal-electron-dashboard" class="btn-github">
                View on GitHub
            </a>
            <a href="./rss/" class="btn-rss">
                Subscribe to RSS Feed
            </a>
        </div>
    </div>
</body>

</html>
